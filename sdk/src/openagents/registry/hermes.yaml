name: hermes
label: Hermes Agent
description: Nous Hermes Agent with tools, profiles, memory, and messaging support
homepage: https://github.com/NousResearch/hermes-agent
tags: [coding, tools, orchestration, profiles]
builtin: true

install:
  binary: hermes
  requires: [python3]
  # Hermes ships a curl-pipe installer that handles platform-specific
  # setup (pipx/uv/venv, PATH wiring, skill sync). There is no
  # `hermes-agent` package on PyPI.
  macos: "curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash"
  linux: "curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash"
  # Native Windows is not supported by hermes-agent upstream — install and run
  # under WSL2. The adapter detects the in-WSL hermes and invokes it via `wsl -e`.
  windows: "wsl.exe -e bash -lc \"curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash -s -- --skip-setup\""

adapter:
  module: openagents.adapters.hermes
  class: HermesAdapter
  options:
    hermes_profile: auto
    hermes_source: tool
    max_turns: 60
    yolo: false
