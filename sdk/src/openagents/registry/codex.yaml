name: codex
label: OpenAI Codex CLI
description: OpenAI's coding agent for the terminal
homepage: https://github.com/openai/codex
tags: [coding, openai, cli]
builtin: true

install:
  binary: codex
  requires: [nodejs]
  macos: "npm install -g @openai/codex"
  linux: "npm install -g @openai/codex"
  windows: "npm install -g @openai/codex"

adapter:
  module: openagents.adapters.codex
  class: CodexAdapter

launch:
  args: []

env_config:
  - name: OPENAI_API_KEY
    description: OpenAI API key
    required: false
    password: true
  - name: OPENAI_BASE_URL
    description: OpenAI-compatible base URL
    required: false

check_ready:
  env_all: [OPENAI_API_KEY, OPENAI_BASE_URL]
  saved_env_all: [OPENAI_API_KEY, OPENAI_BASE_URL]
  status_command: "codex login status"
  login_command: "codex login"
  not_ready_message: "Not configured. Set OPENAI_API_KEY + OPENAI_BASE_URL, or run: codex login"

resolve_env:
  rules:
    - from: LLM_API_KEY
      to: OPENAI_API_KEY
    - from: LLM_BASE_URL
      to: OPENAI_BASE_URL
    - from: LLM_MODEL
      to: CODEX_MODEL
