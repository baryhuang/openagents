name: cursor
label: Cursor
description: AI-powered code editor with agent mode CLI
homepage: https://cursor.com
tags: [coding, editor, cli, ai]
builtin: true

install:
  binary: cursor-agent
  binary_aliases: [agent]
  requires: []
  macos: "curl https://cursor.com/install -fsSL | bash"
  linux: "curl https://cursor.com/install -fsSL | bash"
  windows: "powershell -c \"irm 'https://cursor.com/install?win32=true' | iex\""

adapter:
  module: openagents.adapters.cursor
  class: CursorAdapter

launch:
  args: []

env_config:
  - name: OPENAI_API_KEY
    description: API key for LLM inference
    required: true
    password: true

check_ready:
  env_vars: [OPENAI_API_KEY]
  saved_env_key: OPENAI_API_KEY
  not_ready_message: "No API key — press e to configure"

resolve_env:
  rules:
    - from: LLM_API_KEY
      to: OPENAI_API_KEY
    - from: LLM_BASE_URL
      to: OPENAI_BASE_URL
    - from: LLM_MODEL
      to: CURSOR_MODEL
