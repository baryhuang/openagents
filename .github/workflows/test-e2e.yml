name: E2E Agent Test
on: workflow_dispatch

jobs:
  test-windows:
    runs-on: [self-hosted, windows, desktop-test]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kill stale processes
        shell: cmd
        run: |
          taskkill /F /IM node.exe 2>nul
          echo Killed stale node processes
        continue-on-error: true

      - name: Clean state
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          del "%USERPROFILE%\.openagents\daemon.pid" 2>nul
          del "%USERPROFILE%\.openagents\daemon.status.json" 2>nul
          del "%USERPROFILE%\.openagents\daemon.log" 2>nul
          del "%USERPROFILE%\.openagents\daemon.yaml" 2>nul
          echo State cleaned

      - name: Upgrade and verify openagents CLI
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          npm install -g @openagents-org/agent-launcher@latest
          openagents --version
          openagents search

      - name: Install openclaw if needed
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          openclaw --version 2>nul || (echo Installing openclaw... && npm install -g openclaw@latest)
          openclaw --version

      - name: Create agent and connect to workspace
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          openagents create e2e-test --type openclaw
          openagents connect e2e-test Ux8TWAXT_YP0WUmWjtmDzjtcnZChGVZ7hYCT9ddAzrE
          openagents list

      - name: Start daemon
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          openagents up
          ping -n 6 127.0.0.1 >nul
          openagents status

      - name: Wait for adapter online
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          ping -n 16 127.0.0.1 >nul
          openagents status
          type "%USERPROFILE%\.openagents\daemon.log" 2>nul || echo No log yet

      - name: Send test message via workspace API
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          node -e "const https=require('https');const data=JSON.stringify({type:'workspace.message.posted',source:'human:e2e-tester',target:'channel/e2e-channel',network:'c5be7aa2',payload:{content:'What is 9 plus 3? Reply with just the number.',message_type:'chat'},metadata:{}});const opts={hostname:'workspace-endpoint.openagents.org',port:443,path:'/v1/events',method:'POST',headers:{'Content-Type':'application/json','X-Workspace-Token':'Ux8TWAXT_YP0WUmWjtmDzjtcnZChGVZ7hYCT9ddAzrE','Content-Length':Buffer.byteLength(data)}};const req=https.request(opts,res=>{let b='';res.on('data',d=>b+=d);res.on('end',()=>{console.log('Status:',res.statusCode);console.log('Body:',b);if(res.statusCode>=400)process.exit(1)})});req.on('error',e=>{console.error(e);process.exit(1)});req.write(data);req.end()"

      - name: Wait for agent response
        shell: cmd
        run: |
          ping -n 46 127.0.0.1 >nul
          echo Waited 45 seconds for agent to process

      - name: Check daemon log for response
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          type "%USERPROFILE%\.openagents\daemon.log" 2>nul || echo No log
          echo ---
          openagents status

      - name: Verify response contains answer
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          findstr /C:"responded" "%USERPROFILE%\.openagents\daemon.log" && echo PASS: Agent responded || echo FAIL: No response found in log
          type "%USERPROFILE%\.openagents\daemon.status.json" 2>nul

      - name: Stop daemon
        shell: cmd
        run: |
          set PATH=%USERPROFILE%\.openagents\nodejs;%APPDATA%\npm;%PATH%
          openagents down
        continue-on-error: true
