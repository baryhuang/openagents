name: E2E Agent Test
on: workflow_dispatch

jobs:
  test-windows:
    runs-on: [self-hosted, windows, desktop-test]
    timeout-minutes: 15
    env:
      CDP_PORT: "9333"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kill stale processes
        shell: powershell
        run: |
          Stop-Process -Name node -Force -ErrorAction SilentlyContinue
          Stop-Process -Name electron -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "OpenAgents Launcher" -Force -ErrorAction SilentlyContinue
          Write-Host "Killed stale processes"
        continue-on-error: true

      - name: Clean state
        shell: powershell
        run: |
          Remove-Item "$env:USERPROFILE\.openagents\daemon.*" -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:USERPROFILE\.openagents\daemon.yaml" -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:USERPROFILE\.openagents\nodejs" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "State cleaned"

      - name: Install Node.js and openagents CLI
        shell: powershell
        run: |
          $env:PATH = "$env:USERPROFILE\.openagents\nodejs;$env:APPDATA\npm;$env:PATH"
          irm https://raw.githubusercontent.com/openagents-org/openagents/develop/install.ps1 | iex

      - name: Setup and launch Launcher dev folder
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $env:PATH = "$env:USERPROFILE\.openagents\nodejs;$env:APPDATA\npm;$env:PATH"
          $dir = "$env:USERPROFILE\Desktop\launcher-e2e"
          Remove-Item $dir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          # Use git to get the launcher source directly
          Push-Location $dir
          git init
          git remote add origin https://github.com/openagents-org/openagents.git
          git fetch --depth 1 origin develop
          git checkout FETCH_HEAD -- packages/launcher/src
          Move-Item packages\launcher\src src
          Remove-Item packages -Recurse -Force
          npm init -y 2>$null | Out-Null
          npm install @openagents-org/agent-launcher@latest electron@33 ws 2>&1 | Select-Object -Last 3
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.main = "src/main/main.js"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Pop-Location
          # Create a launch script with full PATH
          $launchScript = "@echo off`r`nset PATH=$env:USERPROFILE\.openagents\nodejs;$env:APPDATA\npm;%PATH%`r`ncd /d $dir`r`nnpx electron . --remote-debugging-port=$env:CDP_PORT --remote-allow-origins=*"
          Set-Content "$dir\launch.bat" $launchScript
          # Launch Electron via the batch file
          Start-Process cmd.exe -ArgumentList "/c $dir\launch.bat" -WindowStyle Normal
          Start-Sleep -Seconds 20
          # Verify CDP
          $retries = 5
          $cdpOk = $false
          for ($i = 0; $i -lt $retries; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:$env:CDP_PORT/json" -UseBasicParsing -TimeoutSec 5
              Write-Host "CDP ready"
              $cdpOk = $true
              break
            } catch {
              Write-Host "CDP attempt $($i+1)/$retries failed, waiting..."
              Start-Sleep -Seconds 5
            }
          }
          if (-not $cdpOk) {
            Write-Host "CDP failed after $retries attempts"
            exit 1
          }

      - name: Run E2E test
        shell: powershell
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          WS_TOKEN: "Ux8TWAXT_YP0WUmWjtmDzjtcnZChGVZ7hYCT9ddAzrE"
        run: |
          $env:PATH = "$env:USERPROFILE\.openagents\nodejs;$env:APPDATA\npm;$env:PATH"
          $env:NODE_PATH = "$env:USERPROFILE\Desktop\launcher-e2e\node_modules"
          node $env:GITHUB_WORKSPACE\e2e-launcher-test.js

      - name: Collect logs
        if: always()
        shell: powershell
        run: |
          Write-Host "=== DAEMON LOG ==="
          Get-Content "$env:USERPROFILE\.openagents\daemon.log" -ErrorAction SilentlyContinue
          Write-Host "=== STATUS ==="
          Get-Content "$env:USERPROFILE\.openagents\daemon.status.json" -ErrorAction SilentlyContinue

      - name: Cleanup
        if: always()
        shell: powershell
        run: |
          Stop-Process -Name node -Force -ErrorAction SilentlyContinue
          Stop-Process -Name electron -Force -ErrorAction SilentlyContinue
