name: Studio Build Check (disabled)

# Disabled — Studio is not actively maintained
# on:
#   push:
#     branches: [ main, develop, release ]
#     paths:
#       - 'sdk/studio/**'
#   pull_request:
#     branches: [ main, develop, release ]
#     paths:
#       - 'sdk/studio/**'
on:
  workflow_dispatch:  # Manual triggering only

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: sdk/studio/yarn.lock

    - name: Install dependencies
      run: |
        cd sdk/studio
        yarn install --frozen-lockfile

    - name: Run linting
      run: |
        cd sdk/studio
        yarn lint || true  # Allow lint warnings, don't fail on unused imports

    - name: TypeScript check
      run: |
        cd sdk/studio
        yarn typecheck || echo "TypeScript check failed (known issue with react-hook-form requiring TS 5+)"

    - name: Build
      env:
        CI: false  # Don't treat warnings as errors
      run: |
        cd sdk/studio
        yarn build

    - name: Verify build output
      run: |
        if [ -d "sdk/studio/build" ] && [ -f "sdk/studio/build/index.html" ]; then
          echo "✅ Build successful - output directory exists"
          ls -la sdk/studio/build/
        else
          echo "❌ Build failed - output directory missing"
          exit 1
        fi
