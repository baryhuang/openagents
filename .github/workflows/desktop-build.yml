name: Build OpenAgents Launcher

on:
  workflow_dispatch:
    inputs:
      sign_windows:
        description: "Sign Windows EXE/MSI via SignPath (Foundation OSS test cert)"
        type: boolean
        default: false
  push:
    tags:
      - 'launcher-v*'
      - 'desktop-v*'

permissions:
  contents: write
  actions: read   # lets the SignPath connector read the job and download the artifact

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            build_script: build:mac:x64
          - arch: arm64
            build_script: build:mac:arm64
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('packages/launcher/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm install

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and sign macOS app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          # Pull electron-builder helper binaries (winCodeSign, etc.) and the
          # electron dist + its SHASUMS checksum from a mirror instead of the
          # GitHub Release CDN, which intermittently 504s.
          ELECTRON_BUILDER_BINARIES_MIRROR: https://registry.npmmirror.com/-/binary/electron-builder-binaries/
          ELECTRON_MIRROR: https://registry.npmmirror.com/-/binary/electron/
        run: |
          # Write API key to file for electron-builder notarization
          API_KEY_PATH=$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$API_KEY_PATH"
          export APPLE_API_KEY="$API_KEY_PATH"

          # Retry to ride out transient electron-builder binary-download 504s.
          for i in 1 2 3; do
            npm run ${{ matrix.build_script }} && exit 0
            echo "::warning::macOS build attempt $i failed (likely a transient electron-builder binary download); retrying in 25s…"
            sleep 25
          done
          echo "macOS build failed after 3 attempts." >&2
          exit 1

      - name: Verify macOS artifacts
        run: |
          ls -la dist
          ls dist/*-mac-${{ matrix.arch }}.dmg >/dev/null
          ls dist/*-mac-${{ matrix.arch }}.zip >/dev/null

      - name: Stage macOS update metadata
        # electron-updater consumes latest-mac.yml from the zip. The x64 and
        # arm64 builds each emit a file with the SAME name, so rename per-arch
        # to survive merge-multiple; the release job merges them back into a
        # single latest-mac.yml covering both architectures.
        run: |
          if [ -f dist/latest-mac.yml ]; then
            cp dist/latest-mac.yml "dist/latest-mac-${{ matrix.arch }}.yml"
          fi

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-macos-${{ matrix.arch }}
          path: |
            packages/launcher/dist/*-mac-${{ matrix.arch }}.dmg
            packages/launcher/dist/*-mac-${{ matrix.arch }}.zip
            packages/launcher/dist/*-mac-${{ matrix.arch }}.zip.blockmap
            packages/launcher/dist/latest-mac-${{ matrix.arch }}.yml
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/launcher
    outputs:
      # Artifact id of the binaries-only upload, consumed by the SignPath action.
      tosign-artifact-id: ${{ steps.upload-tosign.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('packages/launcher/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm install

      - name: Build Windows app
        shell: bash
        env:
          # Avoid the GitHub Release CDN (intermittent 504) for builder binaries
          # and the electron dist + checksum.
          ELECTRON_BUILDER_BINARIES_MIRROR: https://registry.npmmirror.com/-/binary/electron-builder-binaries/
          ELECTRON_MIRROR: https://registry.npmmirror.com/-/binary/electron/
        run: |
          # Retry to ride out transient electron-builder binary-download 504s.
          for i in 1 2 3; do
            npm run build:win && exit 0
            echo "::warning::Windows build attempt $i failed (likely a transient electron-builder binary download); retrying in 25s…"
            sleep 25
          done
          echo "Windows build failed after 3 attempts." >&2
          exit 1

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-unsigned
          path: |
            packages/launcher/dist/*.exe
            packages/launcher/dist/*.msi
            packages/launcher/dist/*.exe.blockmap
            packages/launcher/dist/latest.yml
          if-no-files-found: warn

      # Binaries-only upload that SignPath pulls and signs. Kept separate from the
      # metadata above so the signed zip comes back containing just the installers.
      - name: Upload Windows installers for signing
        id: upload-tosign
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-tosign
          path: |
            packages/launcher/dist/*.exe
            packages/launcher/dist/*.msi
          if-no-files-found: error

  sign-windows:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.sign_windows
    permissions:
      contents: read
      actions: read

    steps:
      # SignPath's GitHub connector pulls the binaries-only artifact uploaded by
      # build-windows, verifies it originated from this workflow (trusted build
      # system + origin verification), signs every *.exe/*.msi per the
      # `windows-installers` artifact configuration, then downloads + extracts the
      # signed zip into ./signed. Switch signing-policy-slug to `release-signing`
      # once SignPath issues the production certificate.
      - name: Sign Windows installers via SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 3cd61c8a-8f13-4e5c-8e40-93e0a15eef32
          project-slug: openagents
          signing-policy-slug: test-signing
          artifact-configuration-slug: windows-zip
          github-artifact-id: ${{ needs.build-windows.outputs.tosign-artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Download unsigned artifacts (for update metadata)
        uses: actions/download-artifact@v4
        with:
          name: launcher-windows-unsigned
          path: unsigned

      - name: Regenerate update metadata for signed EXE
        # SignPath re-signs the EXE *after* electron-builder hashed it, so the
        # sha512/size recorded in the unsigned latest.yml no longer match the
        # bytes we ship. electron-updater verifies that hash and would reject
        # the download. Recompute sha512/size against the signed EXE and drop
        # the now-stale blockmap so the updater falls back to a full download.
        run: |
          set -euo pipefail
          if [ ! -f unsigned/latest.yml ]; then
            echo "::warning::unsigned/latest.yml missing — skipping update metadata (in-app update will be unavailable for this build)"
            exit 0
          fi
          pip install --quiet pyyaml
          SIGNED_EXE=$(ls signed/*.exe | head -1)
          python3 - "$SIGNED_EXE" unsigned/latest.yml signed/latest.yml <<'PY'
          import base64, hashlib, os, sys, yaml
          exe, src, dst = sys.argv[1], sys.argv[2], sys.argv[3]
          data = open(exe, "rb").read()
          sha512 = base64.b64encode(hashlib.sha512(data).digest()).decode()
          size = len(data)
          name = os.path.basename(exe)
          doc = yaml.safe_load(open(src))
          for f in doc.get("files", []):
              if f.get("url", "").endswith(".exe"):
                  f["sha512"] = sha512
                  f["size"] = size
                  f.pop("blockMapSize", None)
          doc["sha512"] = sha512
          doc["size"] = size
          doc["path"] = name
          yaml.safe_dump(doc, open(dst, "w"), default_flow_style=False, sort_keys=False)
          print(open(dst).read())
          PY

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows
          path: signed/*
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('packages/launcher/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm install

      - name: Build Linux app
        shell: bash
        env:
          # The .deb target downloads fpm and AppImage its runtime from the
          # GitHub Release CDN, which intermittently 504s — use a mirror instead
          # (also mirror the electron dist + its checksum).
          ELECTRON_BUILDER_BINARIES_MIRROR: https://registry.npmmirror.com/-/binary/electron-builder-binaries/
          ELECTRON_MIRROR: https://registry.npmmirror.com/-/binary/electron/
        run: |
          # Retry to ride out transient electron-builder binary-download 504s.
          for i in 1 2 3; do
            npm run build:linux && exit 0
            echo "::warning::Linux build attempt $i failed (likely a transient electron-builder binary download); retrying in 25s…"
            sleep 25
          done
          echo "Linux build failed after 3 attempts." >&2
          exit 1

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-linux
          path: |
            packages/launcher/dist/*.AppImage
            packages/launcher/dist/*.deb
            packages/launcher/dist/*.AppImage.blockmap
            packages/launcher/dist/latest-linux.yml
          if-no-files-found: warn

  release:
    needs: [build-macos, build-windows, sign-windows, build-linux]
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/launcher-v') || startsWith(github.ref, 'refs/tags/desktop-v')) && !failure() && !cancelled()

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: launcher-macos-*
          path: artifacts
          merge-multiple: true

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: launcher-linux
          path: artifacts

      - name: Download signed Windows artifacts
        if: needs.sign-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: launcher-windows
          path: artifacts

      - name: Download unsigned Windows artifacts (signing skipped)
        if: needs.sign-windows.result != 'success'
        uses: actions/download-artifact@v4
        with:
          name: launcher-windows-unsigned
          path: artifacts

      - name: Merge macOS update metadata
        # The x64 and arm64 builds each produced a latest-mac-<arch>.yml that
        # only describes its own zip. electron-updater fetches a single
        # latest-mac.yml and picks the entry matching the user's CPU, so merge
        # both files' `files:` lists into one canonical latest-mac.yml.
        run: |
          set -euo pipefail
          shopt -s nullglob
          MAC_YMLS=(artifacts/latest-mac-*.yml)
          if [ ${#MAC_YMLS[@]} -eq 0 ]; then
            echo "No macOS update metadata to merge — skipping."
            exit 0
          fi
          pip install --quiet pyyaml
          python3 - "${MAC_YMLS[@]}" <<'PY'
          import sys, yaml
          docs = [yaml.safe_load(open(p)) for p in sys.argv[1:]]
          merged = dict(docs[0])
          files = []
          seen = set()
          for d in docs:
              for f in d.get("files", []):
                  key = f.get("url")
                  if key and key not in seen:
                      seen.add(key)
                      files.append(f)
          merged["files"] = files
          # Top-level path/sha512/size are the legacy single-file fallback;
          # point them at the first entry. Arch-aware clients use `files`.
          if files:
              merged["path"] = files[0]["url"]
              merged["sha512"] = files[0]["sha512"]
              if "size" in files[0]:
                  merged["size"] = files[0]["size"]
          yaml.safe_dump(merged, open("artifacts/latest-mac.yml", "w"),
                         default_flow_style=False, sort_keys=False)
          print(open("artifacts/latest-mac.yml").read())
          PY
          rm -f artifacts/latest-mac-*.yml

      - name: List release artifacts
        run: ls -la artifacts/

      - name: Verify local artifacts match update metadata (pre-upload)
        # Fail BEFORE publishing if any installer on disk doesn't match the
        # sha512/size recorded in its latest*.yml. Catches build/merge/sign-rehash
        # mismatches (the metadata describing a different build than the binary)
        # so a known-bad release is never created. Upload truncation is caught
        # separately by the post-upload check below.
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          python3 - <<'PY'
          import base64, hashlib, glob, os, sys, yaml
          errors, checked = [], 0
          for y in sorted(glob.glob("artifacts/latest*.yml")):
              doc = yaml.safe_load(open(y))
              for f in doc.get("files", []):
                  url = f.get("url")
                  if not url:
                      continue
                  path = os.path.join("artifacts", url)
                  if not os.path.exists(path):
                      errors.append(f"{os.path.basename(y)} :: {url}: referenced file missing from artifacts/")
                      continue
                  data = open(path, "rb").read()
                  got_size, got_sha = len(data), base64.b64encode(hashlib.sha512(data).digest()).decode()
                  checked += 1
                  if f.get("size") is not None and got_size != f["size"]:
                      errors.append(f"{os.path.basename(y)} :: {url}: size {got_size} != yml {f['size']}")
                  if f.get("sha512") and got_sha != f["sha512"]:
                      errors.append(f"{os.path.basename(y)} :: {url}: sha512 mismatch (binary != yml)")
          if errors:
              print("::error::Local artifact/metadata mismatch — refusing to publish:")
              for e in errors:
                  print("::error::  " + e)
              sys.exit(1)
          print(f"OK: {checked} local installer(s) match their latest*.yml sha512/size.")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenAgents Launcher ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: artifacts/*
          generate_release_notes: true

      - name: Verify published release assets match update metadata (post-upload)
        # The actual bug behind "sha512 checksum mismatch" we hit on win-x64
        # v0.8.8: the .exe upload to the Release was TRUNCATED (114046048 bytes
        # on GitHub vs 114509934 in latest.yml), so every client's hash check
        # failed. A pre-upload check can't see that — verify the PUBLISHED bytes
        # by downloading each file referenced by latest*.yml back from the
        # Release and asserting size + sha512. Fails the job loudly (the release
        # is already public, so re-run / re-publish to fix) on any mismatch.
        env:
          GH_TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          python3 - <<'PY'
          import base64, hashlib, glob, os, sys, time, urllib.request, yaml
          tag, repo = os.environ["GH_TAG"], os.environ["GH_REPO"]
          base = f"https://github.com/{repo}/releases/download/{tag}"
          def fetch(url):
              last = None
              for attempt in range(4):
                  try:
                      with urllib.request.urlopen(url, timeout=120) as r:
                          return r.read()
                  except Exception as e:  # noqa: BLE001
                      last = e
                      time.sleep(5 * (attempt + 1))
              raise last
          errors, checked = [], 0
          for y in sorted(glob.glob("artifacts/latest*.yml")):
              doc = yaml.safe_load(open(y))
              for f in doc.get("files", []):
                  url = f.get("url")
                  if not url:
                      continue
                  data = fetch(f"{base}/{url}")
                  got_size, got_sha = len(data), base64.b64encode(hashlib.sha512(data).digest()).decode()
                  checked += 1
                  if f.get("size") is not None and got_size != f["size"]:
                      errors.append(f"{os.path.basename(y)} :: {url}: published size {got_size} != yml {f['size']}")
                  if f.get("sha512") and got_sha != f["sha512"]:
                      errors.append(f"{os.path.basename(y)} :: {url}: published sha512 mismatch (asset != yml)")
          if errors:
              print("::error::Published asset/metadata mismatch — clients will get 'sha512 checksum mismatch'. Re-publish this release:")
              for e in errors:
                  print("::error::  " + e)
              sys.exit(1)
          print(f"OK: {checked} published asset(s) match their latest*.yml sha512/size.")
          PY
