name: Build OpenAgents Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'launcher-v*'
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
          - os: macos-latest
            build_cmd: npm run build:mac
          - os: ubuntu-latest
            build_cmd: npm run build:linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.os }}
          path: |
            packages/launcher/dist/*.exe
            packages/launcher/dist/*.dmg
            packages/launcher/dist/*.AppImage
            packages/launcher/dist/*.deb
            packages/launcher/dist/*.zip
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/launcher-v') || startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenAgents Launcher ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: artifacts/*
          generate_release_notes: true
