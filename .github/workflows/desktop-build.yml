name: Build OpenAgents Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'launcher-v*'
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm install

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and sign macOS app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          # Write API key to file for electron-builder notarization
          API_KEY_PATH=$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$API_KEY_PATH"
          export APPLE_API_KEY="$API_KEY_PATH"

          npm run build:mac

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-macos
          path: |
            packages/launcher/dist/*.dmg
            packages/launcher/dist/*.zip
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm install

      - name: Build Windows app
        run: npm run build:win

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-unsigned
          path: |
            packages/launcher/dist/*.exe
            packages/launcher/dist/*.msi
          if-no-files-found: warn

  sign-windows:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/launcher-v') || startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Get artifact ID
        id: get-artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --jq '.artifacts[] | select(.name=="launcher-windows-unsigned") | .id')
          echo "artifact_id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"

      - name: Sign EXE with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: "298e12fc-6d10-491f-814d-3418cd924ec8"
          project-slug: "OpenAgents_Launcher"
          signing-policy-slug: "OpenAgents_Launcher_Policy"
          artifact-configuration-slug: "OpenAgents_Launcher_EXE"
          github-artifact-id: ${{ steps.get-artifact.outputs.artifact_id }}
          wait-for-completion: true
          output-artifact-directory: signed-exe

      - name: Sign MSI with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: "298e12fc-6d10-491f-814d-3418cd924ec8"
          project-slug: "OpenAgents_Launcher"
          signing-policy-slug: "OpenAgents_Launcher_Policy"
          artifact-configuration-slug: "OpenAgents_Launcher_MSI"
          github-artifact-id: ${{ steps.get-artifact.outputs.artifact_id }}
          wait-for-completion: true
          output-artifact-directory: signed-msi

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows
          path: |
            signed-exe/*
            signed-msi/*
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm install

      - name: Build Linux app
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-linux
          path: |
            packages/launcher/dist/*.AppImage
            packages/launcher/dist/*.deb
          if-no-files-found: warn

  release:
    needs: [build-macos, sign-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/launcher-v') || startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenAgents Launcher ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: artifacts/*
          generate_release_notes: true
