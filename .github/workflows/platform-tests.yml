name: Platform Agent Tests

on:
  workflow_dispatch:  # Manual trigger — these install real agent packages
    inputs:
      agents:
        description: 'Agents to test (comma-separated: claude,openclaw or "all")'
        required: false
        default: 'all'

jobs:
  install-claude:
    if: ${{ github.event.inputs.agents == 'all' || contains(github.event.inputs.agents, 'claude') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install openagents SDK
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html
        pip install -e .

    - name: Run Claude Code install tests
      run: pytest tests/platform/install/test_claude.py -v -s --tb=long --junitxml=reports/claude-install.xml --html=reports/claude-install.html --self-contained-html

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: claude-install-${{ matrix.os }}
        path: reports/

  install-openclaw:
    if: ${{ github.event.inputs.agents == 'all' || contains(github.event.inputs.agents, 'openclaw') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install openagents SDK
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html
        pip install -e .

    - name: Run OpenClaw install tests
      run: pytest tests/platform/install/test_openclaw.py -v -s --tb=long --junitxml=reports/openclaw-install.xml --html=reports/openclaw-install.html --self-contained-html

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-install-${{ matrix.os }}
        path: reports/

  summary:
    if: always()
    needs: [install-claude, install-openclaw]
    runs-on: ubuntu-latest
    steps:
    - name: Download all reports
      uses: actions/download-artifact@v4
      with:
        path: all-reports/

    - name: Summary
      run: |
        echo "## Platform Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Agent | OS | Tests | Failures | Errors |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|----|-------|----------|--------|" >> $GITHUB_STEP_SUMMARY
        find all-reports/ -name "*.xml" | sort | while read f; do
          agent=$(echo "$f" | grep -oP '(claude|openclaw)')
          os=$(echo "$f" | grep -oP '(ubuntu|macos|windows)')
          tests=$(grep -oP 'tests="\K[^"]+' "$f" | head -1)
          failures=$(grep -oP 'failures="\K[^"]+' "$f" | head -1)
          errors=$(grep -oP 'errors="\K[^"]+' "$f" | head -1)
          echo "| $agent | $os | $tests | $failures | $errors |" >> $GITHUB_STEP_SUMMARY
        done

    - name: Upload combined reports
      uses: actions/upload-artifact@v4
      with:
        name: platform-test-reports-all
        path: all-reports/
