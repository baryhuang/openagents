name: Platform Agent Tests

on:
  workflow_dispatch:  # Manual trigger — these install real agent packages
    inputs:
      agents:
        description: 'Agents to test (comma-separated: claude,openclaw,codex or "all")'
        required: false
        default: 'all'

jobs:
  test-claude:
    if: ${{ github.event.inputs.agents == 'all' || contains(github.event.inputs.agents, 'claude') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install openagents SDK
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html
        pip install -e ".[sdk]"

    - name: "Test 1: Install Claude Code"
      run: pytest tests/platform/install/test_claude.py -v -s --tb=long --junitxml=reports/claude-install.xml

    - name: "Test 2: Start Claude Code"
      if: success()
      run: pytest tests/platform/start/test_claude.py -v -s --tb=long --junitxml=reports/claude-start.xml

    - name: "Test 3: Connect Claude Code to workspace"
      if: success()
      run: pytest tests/platform/connect/test_claude.py -v -s --tb=long --junitxml=reports/claude-connect.xml

    - name: "Test 4: Respond to message (Claude Code)"
      if: success()
      run: pytest tests/platform/respond/test_claude.py -v -s --tb=long --junitxml=reports/claude-respond.xml

    - name: "Daemon log (debug)"
      if: always()
      shell: bash
      run: |
        LOG="$HOME/.openagents/daemon.log"
        if [ -f "$LOG" ]; then
          echo "=== Daemon log (last 200 lines) ==="
          tail -200 "$LOG"
        else
          echo "No daemon log found at $LOG"
        fi

    - name: "Test 5: Execute tool calls (Claude Code)"
      if: success()
      run: pytest tests/platform/tools/test_claude.py -v -s --tb=long --junitxml=reports/claude-tools.xml

    - name: "Test 6: Workspace tools (Claude Code)"
      if: success()
      run: pytest tests/platform/workspace_tools/test_claude.py -v -s --tb=long --junitxml=reports/claude-workspace-tools.xml

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: claude-${{ matrix.os }}
        path: reports/

  test-openclaw:
    if: ${{ github.event.inputs.agents == 'all' || contains(github.event.inputs.agents, 'openclaw') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install openagents SDK
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html
        pip install -e ".[sdk]"

    - name: Read model from config
      shell: bash
      run: |
        MODEL=$(python -c "import yaml; print(yaml.safe_load(open('tests/platform/config.yaml'))['agents']['openclaw']['model'])")
        echo "LLM_MODEL=$MODEL" >> "$GITHUB_ENV"

    - name: "Test 1: Install OpenClaw"
      run: pytest tests/platform/install/test_openclaw.py -v -s --tb=long --junitxml=reports/openclaw-install.xml

    - name: "Test 2: Start OpenClaw"
      if: success()
      run: pytest tests/platform/start/test_openclaw.py -v -s --tb=long --junitxml=reports/openclaw-start.xml

    - name: "Test 3: Connect OpenClaw to workspace"
      if: success()
      run: pytest tests/platform/connect/test_openclaw.py -v -s --tb=long --junitxml=reports/openclaw-connect.xml

    - name: "Test 4: Respond to message (OpenClaw)"
      if: success()
      run: pytest tests/platform/respond/test_openclaw.py -v -s --tb=long --junitxml=reports/openclaw-respond.xml

    - name: "Daemon log (debug)"
      if: always()
      shell: bash
      run: |
        LOG="$HOME/.openagents/daemon.log"
        if [ -f "$LOG" ]; then
          echo "=== Daemon log (last 200 lines) ==="
          tail -200 "$LOG"
        else
          echo "No daemon log found at $LOG"
        fi

    - name: "Test 5: Execute tool calls (OpenClaw)"
      if: success()
      run: pytest tests/platform/tools/test_openclaw.py -v -s --tb=long --junitxml=reports/openclaw-tools.xml

    - name: "Test 6: Workspace tools (OpenClaw)"
      if: success()
      run: pytest tests/platform/workspace_tools/test_openclaw.py -v -s --tb=long --junitxml=reports/openclaw-workspace-tools.xml

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-${{ matrix.os }}
        path: reports/

  test-codex:
    if: ${{ github.event.inputs.agents == 'all' || contains(github.event.inputs.agents, 'codex') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install openagents SDK
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html
        pip install -e ".[sdk]"

    - name: Read model from config
      shell: bash
      run: |
        MODEL=$(python -c "import yaml; print(yaml.safe_load(open('tests/platform/config.yaml'))['agents']['codex']['model'])")
        echo "LLM_MODEL=$MODEL" >> "$GITHUB_ENV"

    - name: "Test 1: Install Codex"
      run: pytest tests/platform/install/test_codex.py -v -s --tb=long --junitxml=reports/codex-install.xml

    - name: "Test 2: Start Codex"
      if: success()
      run: pytest tests/platform/start/test_codex.py -v -s --tb=long --junitxml=reports/codex-start.xml

    - name: "Test 3: Connect Codex to workspace"
      if: success()
      run: pytest tests/platform/connect/test_codex.py -v -s --tb=long --junitxml=reports/codex-connect.xml

    - name: "Test 4: Respond to message (Codex)"
      if: success()
      run: pytest tests/platform/respond/test_codex.py -v -s --tb=long --junitxml=reports/codex-respond.xml

    - name: "Daemon log (debug)"
      if: always()
      shell: bash
      run: |
        LOG="$HOME/.openagents/daemon.log"
        if [ -f "$LOG" ]; then
          echo "=== Daemon log (last 200 lines) ==="
          tail -200 "$LOG"
        else
          echo "No daemon log found at $LOG"
        fi

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: codex-${{ matrix.os }}
        path: reports/

  summary:
    if: always()
    needs: [test-claude, test-openclaw, test-codex]
    runs-on: ubuntu-latest
    steps:
    - name: Download all reports
      uses: actions/download-artifact@v4
      with:
        path: all-reports/

    - name: Summary
      run: |
        echo "## Platform Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Agent | Test | OS | Tests | Failures | Errors |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|------|----|-------|----------|--------|" >> $GITHUB_STEP_SUMMARY
        find all-reports/ -name "*.xml" | sort | while read f; do
          agent=$(echo "$f" | grep -oP '(claude|openclaw|codex)')
          test_type=$(echo "$f" | grep -oP '(install|start|connect|respond|tools|workspace)')
          os=$(echo "$f" | grep -oP '(ubuntu|macos|windows)')
          tests=$(grep -oP 'tests="\K[^"]+' "$f" | head -1)
          failures=$(grep -oP 'failures="\K[^"]+' "$f" | head -1)
          errors=$(grep -oP 'errors="\K[^"]+' "$f" | head -1)
          echo "| $agent | $test_type | $os | $tests | $failures | $errors |" >> $GITHUB_STEP_SUMMARY
        done

    - name: Upload combined reports
      uses: actions/upload-artifact@v4
      with:
        name: platform-test-reports-all
        path: all-reports/
