name: Python Tests

on:
  workflow_dispatch:  # Manual trigger only — run from GitHub UI

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-lint-

    - name: Collect changed Python files
      id: changed-python
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ github.event_name }}" = "pull_request" ]; then
          base_ref="${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags --prune --depth=1 origin "$base_ref"
          merge_base="$(git merge-base "origin/$base_ref" "${{ github.sha }}")"
          diff_from="$merge_base"
        elif [ "${{ github.event_name }}" = "push" ]; then
          before_sha="${{ github.event.before }}"
          if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
            diff_from="$before_sha"
          else
            if git rev-parse --verify "${{ github.sha }}^" >/dev/null 2>&1; then
              diff_from="$(git rev-parse "${{ github.sha }}^")"
            else
              diff_from="$(git hash-object -t tree /dev/null)"
            fi
          fi
        else
          echo "No PR/push diff context for ${GITHUB_EVENT_NAME}; skipping lint."
          echo "has_python=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$diff_from" "${{ github.sha }}" -- '*.py')

        if [ "${#files[@]}" -eq 0 ]; then
          echo "No changed Python files detected; skipping lint."
          echo "has_python=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Changed Python files:"
        printf ' - %s\n' "${files[@]}"

        {
          echo "has_python=true"
          echo "files<<EOF"
          printf '%s\n' "${files[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Install lint dependencies
      if: steps.changed-python.outputs.has_python == 'true'
      run: |
        python -m pip install --upgrade pip
        # Pin to match .pre-commit-config.yaml so local and CI agree
        pip install "ruff==0.6.9"

    - name: Run Ruff check
      if: steps.changed-python.outputs.has_python == 'true'
      shell: bash
      env:
        PYTHON_FILES: ${{ steps.changed-python.outputs.files }}
      run: |
        mapfile -t files <<< "$PYTHON_FILES"
        ruff check "${files[@]}"

    - name: Run Ruff format check
      if: steps.changed-python.outputs.has_python == 'true'
      shell: bash
      env:
        PYTHON_FILES: ${{ steps.changed-python.outputs.files }}
      run: |
        mapfile -t files <<< "$PYTHON_FILES"
        ruff format --check "${files[@]}"

  # -----------------------------------------------------------------------
  # Fast client tests — lightweight base install only (no gRPC/crypto/MCP)
  # Runs ONM unit tests + workspace backend tests
  # -----------------------------------------------------------------------
  client-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-client-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-client-

    - name: Install dependencies (base only)
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-aiohttp pytest-mock
        pip install -e .
        pip install -r workspace/backend/requirements.txt

    - name: Test ONM primitives
      run: pytest --tb=short -v tests/test_onm_addressing.py tests/test_onm_events.py tests/test_onm_pipeline.py

    - name: Test workspace backend
      env:
        PYTHONPATH: workspace/backend:sdk/src
      run: pytest --tb=short -v workspace/backend/tests/

  # -----------------------------------------------------------------------
  # Full SDK tests — includes gRPC, crypto, MCP, OpenAI deps
  # Runs all tests under tests/ (a2a, grpc, http, mods, etc.)
  # -----------------------------------------------------------------------
  sdk-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-sdk-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-sdk-

    - name: Install dependencies (full SDK)
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio pytest-aiohttp pytest-mock
        pip install -e ".[sdk]"

    - name: Test a2a
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/a2a

    - name: Test agents
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/agents

    - name: Test external_access
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/external_access

    - name: Test grpc
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/grpc

    - name: Test http
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/http

    - name: Test integration
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        DEFAULT_LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        DEFAULT_LLM_MODEL_NAME: gpt-4o-mini
        DEFAULT_LLM_PROVIDER: openai
      run: pytest --tb=short -v tests/integration

    - name: Test lms
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/lms

    - name: Test mods
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/mods

    - name: Test network
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/network

    # Studio tests disabled — Studio is not actively maintained
    # - name: Test studio
    #   env:
    #     PYTHONHASHSEED: "0"
    #     GRPC_ENABLE_FORK_SUPPORT: "1"
    #     GRPC_POLL_STRATEGY: "poll"
    #   run: pytest --tb=short -v tests/studio

    - name: Test utils
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/utils

    - name: Test workspace
      env:
        PYTHONHASHSEED: "0"
        GRPC_ENABLE_FORK_SUPPORT: "1"
        GRPC_POLL_STRATEGY: "poll"
      run: pytest --tb=short -v tests/workspace

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
