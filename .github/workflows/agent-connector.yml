name: Agent Connector

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'packages/agent-connector/**'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'packages/agent-connector/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['18', '20', '22']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Run tests
      working-directory: packages/agent-connector
      # shell: bash ensures the `test/*.test.js` glob is expanded by bash
      # even on Windows runners (PowerShell doesn't expand globs).
      shell: bash
      run: node --test test/*.test.js

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Publish to npm
      working-directory: packages/agent-connector
      # Skip when this exact version is already on npm so a push to develop that
      # doesn't bump the version doesn't fail the job with E403 ("cannot publish
      # over previously published versions"). Only an actual version bump
      # publishes.
      run: |
        NAME=$(node -p "require('./package.json').name")
        VERSION=$(node -p "require('./package.json').version")
        if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
          echo "$NAME@$VERSION already published — skipping publish."
          exit 0
        fi
        npm publish --access public --provenance
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
