name: Test Desktop App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to test (e.g. launcher-v0.2.0)'
        required: true
        default: 'launcher-v0.2.0'

jobs:
  test-windows:
    runs-on: [self-hosted, windows, desktop-test]
    timeout-minutes: 30
    steps:
      - name: Clean environment
        shell: powershell
        run: |
          # Kill any running launcher
          Stop-Process -Name "OpenAgents Launcher" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "electron" -Force -ErrorAction SilentlyContinue
          # Remove old .openagents config
          Remove-Item -Recurse -Force "$env:USERPROFILE\.openagents" -ErrorAction SilentlyContinue
          # Remove old launcher installs
          Remove-Item -Recurse -Force "$env:USERPROFILE\OALauncher" -ErrorAction SilentlyContinue
          Write-Host "Environment cleaned"

      - name: Download release
        shell: powershell
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          Write-Host "Downloading $tag..."
          $headers = @{ "Accept" = "application/vnd.github.v3+json" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/openagents-org/openagents/releases/tags/$tag" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -like "*win-x64.exe" } | Select-Object -First 1
          if (-not $asset) { throw "No win-x64.exe asset found in release $tag" }
          Write-Host "Downloading $($asset.name) ($([math]::Round($asset.size/1MB, 1)) MB)..."
          $dest = "$env:USERPROFILE\Desktop\launcher-test.exe"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $dest -UseBasicParsing
          Write-Host "Downloaded: $dest"

      - name: Launch app with CDP
        shell: powershell
        run: |
          # Run the NSIS exe directly — it works as a portable app too
          $exe = "$env:USERPROFILE\Desktop\launcher-test.exe"
          Write-Host "Launching: $exe"
          Start-Process $exe -ArgumentList "--remote-debugging-port=9333","--remote-allow-origins=*"
          # Wait for CDP to be ready
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep 1
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:9333/json" -UseBasicParsing -TimeoutSec 2
              if ($response.StatusCode -eq 200) {
                Write-Host "CDP ready after $($i+1)s"
                break
              }
            } catch {}
          }

      - name: Setup Node.js for Playwright
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Checkout test script
        uses: actions/checkout@v4
        with:
          sparse-checkout: infra/test_app.js
          sparse-checkout-cone-mode: false

      - name: Install Playwright and run tests
        shell: powershell
        run: |
          cd infra
          npm init -y
          npm install playwright
          npx playwright install chromium
          node test_app.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-windows
          path: infra/screenshot_*.png

      - name: Cleanup
        if: always()
        shell: powershell
        run: |
          Stop-Process -Name "OpenAgents Launcher" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "electron" -Force -ErrorAction SilentlyContinue

  test-macos:
    runs-on: [self-hosted, macos, desktop-test]
    timeout-minutes: 30
    steps:
      - name: Clean environment
        run: |
          pkill -f "OpenAgents Launcher" 2>/dev/null || true
          pkill -f Electron 2>/dev/null || true
          rm -rf ~/.openagents 2>/dev/null || true
          echo "Environment cleaned"

      - name: Download release
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "Downloading $TAG..."
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            PATTERN="mac-arm64.dmg"
          else
            PATTERN="mac-x64.dmg"
          fi
          API_URL="https://api.github.com/repos/openagents-org/openagents/releases/tags/$TAG"
          DOWNLOAD_URL=$(curl -s "$API_URL" | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; print([a['browser_download_url'] for a in assets if '$PATTERN' in a['name']][0])")
          echo "Downloading: $DOWNLOAD_URL"
          curl -L -o /tmp/launcher-test.dmg "$DOWNLOAD_URL"
          echo "Downloaded: /tmp/launcher-test.dmg"

      - name: Install app
        run: |
          # Mount DMG
          hdiutil detach /Volumes/OpenAgents* 2>/dev/null || true
          hdiutil attach /tmp/launcher-test.dmg -nobrowse
          # Remove old app completely first
          rm -rf "/Applications/OpenAgents Launcher.app"
          # Copy new app
          VOLUME=$(ls -d /Volumes/OpenAgents* | head -1)
          cp -R "$VOLUME/OpenAgents Launcher.app" /Applications/
          hdiutil detach "$VOLUME" 2>/dev/null || true
          # Remove quarantine
          xattr -cr "/Applications/OpenAgents Launcher.app"
          echo "Installed to /Applications"

      - name: Launch app with CDP
        run: |
          open "/Applications/OpenAgents Launcher.app" --args --remote-debugging-port=9333 --remote-allow-origins=*
          # Wait for CDP
          for i in $(seq 1 30); do
            sleep 1
            if curl -s http://127.0.0.1:9333/json > /dev/null 2>&1; then
              echo "CDP ready after ${i}s"
              break
            fi
          done

      - name: Setup Node.js for Playwright
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Checkout test script
        uses: actions/checkout@v4
        with:
          sparse-checkout: infra/test_app.js
          sparse-checkout-cone-mode: false

      - name: Install Playwright and run tests
        run: |
          cd infra
          npm init -y
          npm install playwright
          npx playwright install chromium
          node test_app.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-macos
          path: infra/screenshot_*.png

      - name: Cleanup
        if: always()
        run: |
          pkill -f "OpenAgents Launcher" 2>/dev/null || true
          pkill -f Electron 2>/dev/null || true
