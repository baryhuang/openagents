# Platform test configuration
#
# Centralizes model selection, endpoint, and credential env var names
# so they're easy to change without touching secrets or test code.

workspace_endpoint: https://workspace-endpoint.openagents.org

agents:
  claude:
    binary: claude
    model: claude-sonnet-4-6
    credential_env:
      - ANTHROPIC_API_KEY

  openclaw:
    binary: openclaw
    model: claude-sonnet-4-6
    credential_env:
      - LLM_API_KEY
      - OPENAI_API_KEY

  codex:
    binary: codex
    model: gpt-5.4
    credential_env:
      - LLM_API_KEY
      - OPENAI_API_KEY

  nanoclaw:
    binary: nanoclaw
    model: claude-sonnet-4-6
    credential_env:
      - LLM_API_KEY
      - OPENAI_API_KEY
