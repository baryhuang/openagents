name: OpenAgentsGo
options:
  bundleIdPrefix: com.openagents
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.2.1"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_NAME: "OpenAgents Go"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
targets:
  OpenAgentsGo:
    type: application
    platform: [macOS, iOS]
    deploymentTarget:
      macOS: "15.0"
      iOS: "18.0"
    sources:
      - path: OpenAgents
    info:
      path: OpenAgents/Info.plist
      properties:
        CFBundleDisplayName: OpenAgents Go
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "Copyright © 2026 OpenAgents"
        # Skips the App Store Connect "App Encryption Documentation" prompt on
        # every upload. The app only uses Apple-provided standard encryption
        # (HTTPS via URLSession + Keychain), which is exempt from US export
        # compliance review.
        ITSAppUsesNonExemptEncryption: false
        # Required for App Store upload of a universal (iPhone+iPad) app.
        # iPad multitasking validation requires all four orientations on iPad
        # and a launch screen via UILaunchScreen (replaces a storyboard).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openagents.go
        PRODUCT_NAME: "OpenAgents Go"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    entitlements:
      path: OpenAgents/OpenAgents.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
