name: OpenAgentsGo
options:
  bundleIdPrefix: com.openagents
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0
  SwiftUIJSONRender:
    url: https://github.com/bipa-app/swiftui-json-render
    exactVersion: "0.2.1"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.6.1"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_NAME: "OpenAgents Go"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
targets:
  OpenAgentsGo:
    type: application
    platform: [macOS, iOS]
    deploymentTarget:
      macOS: "15.0"
      iOS: "18.0"
    sources:
      - path: OpenAgents
    dependencies:
      # AuthStore.swift unconditionally imports FirebaseCore and GoogleSignIn
      # at top-level (no `#if os(iOS)` guard), so both platforms must link
      # them. If we ever gate the imports per-platform we can re-narrow.
      - package: Firebase
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: SwiftUIJSONRender
        product: SwiftUIJSONRender
    info:
      path: OpenAgents/Info.plist
      properties:
        CFBundleDisplayName: OpenAgents Go
        UIBackgroundModes:
          - remote-notification
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "Copyright © 2026 OpenAgents"
        # Google Sign-In OAuth callback. The scheme value must match
        # REVERSED_CLIENT_ID in GoogleService-Info.plist.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.796726902048-5g72t1en8hchvl88oq5j1d5pake48u7g
        # Skips the App Store Connect "App Encryption Documentation" prompt on
        # every upload. The app only uses Apple-provided standard encryption
        # (HTTPS via URLSession + Keychain), which is exempt from US export
        # compliance review.
        ITSAppUsesNonExemptEncryption: false
        # Advertise that we can receive arbitrary documents — wires the app
        # into iOS "Open in…" pickers / share targets and macOS "Open With"
        # menus. We're not the primary handler for any of these (LSHandlerRank:
        # Alternate); on receipt the file becomes a chat-input attachment.
        # `LSSupportsOpeningDocumentsInPlace` is intentionally omitted: on iOS
        # the default (no in-place edit, file copied to the Inbox) is what we
        # want, and the key is rejected by the macOS bundle validator.
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Attachment"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.image
              - public.movie
              - public.audio
              - public.pdf
              - public.text
              - public.composite-content
              - public.archive
              - public.data
        # Required for App Store upload of a universal (iPhone+iPad) app.
        # iPad multitasking validation requires all four orientations on iPad
        # and a launch screen via UILaunchScreen (replaces a storyboard).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    settings:
      base:
        # MUST match `APNS_BUNDLE_ID` on the backend (workspace/backend/app/
        # config.py defaults to "org.openagents.workspace") AND the fallback
        # in PushSink.swift. APNs routes by topic == bundle id; any drift
        # silently drops every notification. xcodegen regen will overwrite
        # this from project.yml — don't hand-edit the .pbxproj.
        PRODUCT_BUNDLE_IDENTIFIER: org.openagents.workspace
        PRODUCT_NAME: "OpenAgents Go"
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": OpenAgents/OpenAgents-macOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]": OpenAgents/OpenAgents.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": OpenAgents/OpenAgents.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          "CODE_SIGN_INJECT_BASE_ENTITLEMENTS[sdk=macosx*]": NO
    entitlements:
      path: OpenAgents/OpenAgents.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        # Production APNs — pushes hit api.push.apple.com, not the sandbox.
        # Dev builds and TestFlight both use this; the only path that needs
        # `development` would be a fresh in-Xcode debug install routing to
        # api.development.push.apple.com (rarely useful for this app).
        aps-environment: production
